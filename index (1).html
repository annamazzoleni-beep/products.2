<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna's marketplace-sell everything</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F9F8F6;
      --surface: #FFFFFF;
      --ink: #1A1A18;
      --muted: #7A7A72;
      --accent: #3D6B4F;
      --accent-light: #E8F0EB;
      --border: #E4E2DC;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .shop-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .shop-title span {
      color: var(--accent);
    }

    .item-count {
      font-size: 0.8125rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── Grid ── */
    main {
      padding: 40px;
      max-width: 1320px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.09);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      display: block;
      background: var(--accent-light);
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .card-category {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 6px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.125rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
    }

    .card-price {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--ink);
    }

    .card-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .card-btn:hover {
      background: #2e5139;
    }

    /* ── Add Product Button ── */
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.15s ease, transform 0.15s ease;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #2e5139;
      transform: translateY(-1px);
    }

    .add-btn svg {
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.8125rem;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      header, main { padding: 24px 20px; }
      .grid { gap: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { transition: none; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1 class="shop-title">Our <span>Shop</span></h1>
    <p class="item-count">8 items</p>
  </div>
  <a href="add-product.html" class="add-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M7.5 1.5V13.5M1.5 7.5H13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Enter Product
  </a>
</header>

<main>
  <div class="grid" id="product-grid"></div>
</main>

<footer>
  Products loaded from Google Sheets. Update your sheet to change what appears here.
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcCaIgQOz3etiMrS23TzZVYMgH_GiH2MJsaVvALgCYcNIrQDvCcNpE6oeOmYCXraJoJtvfj1XqUz7Z/pub?output=csv';

  const grid = document.getElementById('product-grid');
  const countEl = document.querySelector('.item-count');

  // Parse a CSV string into an array of objects using the first row as headers.
  // Handles quoted fields that may contain commas.
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = splitCSVRow(lines[0]).map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const values = splitCSVRow(line);
      return Object.fromEntries(headers.map((h, i) => [h, (values[i] || '').trim()]));
    }).filter(row => Object.values(row).some(v => v)); // skip blank rows
  }

  function splitCSVRow(row) {
    const result = [];
    let field = '';
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') {
        if (inQuotes && row[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        result.push(field); field = '';
      } else {
        field += ch;
      }
    }
    result.push(field);
    return result;
  }

  function renderCard(p) {
    const price = parseFloat(p.price);
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy" />
      <div class="card-body">
        <p class="card-category">${p.category || ''}</p>
        <h2 class="card-name">${p.name}</h2>
        <div class="card-footer">
          <span class="card-price">${isNaN(price) ? p.price : '$' + price.toFixed(2)}</span>
          <button class="card-btn">Add to cart</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }

  function showError(msg) {
    grid.innerHTML = `<p style="color:var(--muted);grid-column:1/-1;padding:20px 0;">${msg}</p>`;
  }

  async function loadProducts() {
    grid.innerHTML = `<p style="color:var(--muted);grid-column:1/-1;padding:20px 0;">Loading products…</p>`;
    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const products = parseCSV(text);
      if (!products.length) { showError('No products found in the sheet.'); return; }
      grid.innerHTML = '';
      products.forEach(renderCard);
      countEl.textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;
    } catch (err) {
      showError('Could not load products. Make sure the Google Sheet is published and the URL is correct.');
      console.error(err);
    }
  }

  loadProducts();
</script>

</body>
</html>
